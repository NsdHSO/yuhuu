name: Test

on:
  workflow_call:
    outputs:
      tests-passed:
        description: "Whether tests passed"
        value: ${{ jobs.test.outputs.passed }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run linter
        run: pnpm lint:all

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      passed: ${{ steps.tests.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run tests with coverage
        id: tests
        run: pnpm test:all

      - name: Check if coverage exists
        id: coverage-check
        run: |
          if [ -d "coverage" ] && [ "$(ls -A coverage)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        if: always()

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30
        if: always() && steps.coverage-check.outputs.exists == 'true'

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.coverage-check.outputs.exists }}" == "true" ]; then
            echo "📊 Coverage report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No coverage generated (run \`pnpm test:coverage\` to generate)" >> $GITHUB_STEP_SUMMARY
          fi

  test-complete:
    name: Tests Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint
      - test
    steps:
      - name: All checks passed
        run: echo "Lint and test jobs completed successfully"
