name: Test

on:
  workflow_call:
    outputs:
      tests-passed:
        description: "Whether tests passed"
        value: ${{ jobs.test.outputs.passed }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run linter
        run: pnpm lint:all

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      passed: ${{ steps.tests.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run tests with coverage
        id: tests
        run: pnpm test:all

      - name: Check if coverage exists
        id: coverage-check
        run: |
          # Check for coverage in workspace packages
          if find packages -name "coverage" -type d | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Coverage found in workspace packages:"
            find packages -name "coverage" -type d
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        if: always()

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: packages/*/coverage/
          retention-days: 30
        if: always() && steps.coverage-check.outputs.exists == 'true'

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.coverage-check.outputs.exists }}" == "true" ]; then
            echo "### Coverage Reports 📊" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage reports uploaded from:" >> $GITHUB_STEP_SUMMARY
            find packages -name "coverage" -type d | while read dir; do
              package=$(echo "$dir" | cut -d'/' -f2)
              echo "- \`$package\` package" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[Download coverage artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No coverage generated. To generate coverage, run:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "pnpm test:coverage  # For app package" >> $GITHUB_STEP_SUMMARY
            echo "# or" >> $GITHUB_STEP_SUMMARY
            echo "pnpm -r run test:coverage  # For all packages" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

  test-complete:
    name: Tests Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint
      - test
    steps:
      - name: All checks passed
        run: echo "Lint and test jobs completed successfully"
