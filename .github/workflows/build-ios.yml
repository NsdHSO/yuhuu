name: Build iOS FAT

on:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 45
    environment: FAT
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('packages/app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install ccache
        run: |
          brew install ccache
          ccache --set-config=max_size=2G
          ccache --set-config=sloppiness=clang_index_store,file_stat_matches,include_file_mtime,include_file_ctime,time_macros,modules
          ccache --zero-stats

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            packages/app/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('packages/app/package.json', 'packages/app/app.config.js') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Validate environment variables
        run: |
          if [ -z "${EXPO_PUBLIC_GRAPHQL_URL}" ]; then
            echo "::error::EXPO_PUBLIC_GRAPHQL_URL is not set. Define FAT_GRAPHQL_URL secret." && exit 1
          fi
          if printf "%s" "$EXPO_PUBLIC_GRAPHQL_URL" | grep -Eq '^http://(localhost|127\.0\.0\.1)'; then
            echo "::error::Refusing to build release with localhost URL. Set FAT_GRAPHQL_URL to a reachable host." && exit 1
          fi
        env:
          EXPO_PUBLIC_GRAPHQL_URL: ${{ secrets.FAT_GRAPHQL_URL }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_AUTH_API_URL: ${{ secrets.EXPO_PUBLIC_AUTH_API_URL }}

      - name: Cache iOS prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: packages/app/ios/
          key: ${{ runner.os }}-ios-prebuild-${{ hashFiles('packages/app/app.config.js', 'packages/app/package.json', 'pnpm-lock.yaml') }}

      - name: Prebuild iOS
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        working-directory: packages/app
        run: npx expo prebuild --platform ios
        env:
          EXPO_PUBLIC_GRAPHQL_URL: ${{ secrets.FAT_GRAPHQL_URL }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_AUTH_API_URL: ${{ secrets.EXPO_PUBLIC_AUTH_API_URL }}
          EXPO_PUBLIC_ENV: fat

      - name: Fix plist encoding (Expo prebuild compatibility)
        run: |
          chmod +x scripts/fix-plist-encoding.sh
          scripts/fix-plist-encoding.sh

      - name: Install iOS Dependencies
        working-directory: packages/app/ios
        run: pod install
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: packages/app/ios/build
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('packages/app/ios/Podfile.lock', 'packages/app/app.config.js') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Setup iOS Signing (Ad-Hoc)
        run: |
          # Create a temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate if provided, otherwise use ad-hoc signing
          if [ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]; then
            echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
            security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          fi

      - name: Build iOS Release
        working-directory: packages/app/ios
        env:
          EXPO_PUBLIC_GRAPHQL_URL: ${{ secrets.FAT_GRAPHQL_URL }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_AUTH_API_URL: ${{ secrets.EXPO_PUBLIC_AUTH_API_URL }}
          EXPO_PUBLIC_ENV: fat
        run: |
          export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
          xcodebuild -workspace Yuhuu.xcworkspace \
            -scheme Yuhuu \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Show ccache statistics
        run: |
          echo "=== ccache statistics ==="
          ccache --show-stats
          ccache --show-config | grep -E "(max_size|sloppiness|cache_dir)"

      - name: Create IPA from App
        working-directory: packages/app/ios
        run: |
          # Find the .app file
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)

          # Create Payload directory
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Create IPA
          zip -r Yuhuu.ipa Payload

          # Move IPA to build directory
          mkdir -p build/ipa
          mv Yuhuu.ipa build/ipa/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuhuu-fat-ios-${{ github.sha }}
          path: packages/app/ios/build/ipa/Yuhuu.ipa
          retention-days: 30

  deploy:
    name: Deploy to FAT
    needs: build
    runs-on: ubuntu-latest
    environment: FAT
    permissions:
      contents: write
    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: yuhuu-fat-ios-${{ github.sha }}

      - name: Rename IPA
        run: mv Yuhuu.ipa yuhuu-fat-ios-${{ github.sha }}.ipa

      - name: Create Release Body
        id: release-body
        run: |
          cat << 'EOF' > release-body.md
          ## Latest iOS FAT Build 🚀

          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Build Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ### Download & Install
          Download the IPA file below and install it on your iOS device using:
          - [AltStore](https://altstore.io/)
          - [Sideloadly](https://sideloadly.io/)
          - Apple TestFlight (if configured)
          EOF

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-fat-ios
          name: Latest iOS FAT Build
          body_path: release-body.md
          files: yuhuu-fat-ios-${{ github.sha }}.ipa
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy summary
        run: |
          echo "## Deployment Results 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ iOS FAT deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "📱 Platform: iOS" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download:" >> $GITHUB_STEP_SUMMARY
          echo "- [📥 Latest iOS FAT IPA](https://github.com/${{ github.repository }}/releases/tag/latest-fat-ios)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download IPA from the release link above" >> $GITHUB_STEP_SUMMARY
          echo "2. Install using AltStore, Sideloadly, or TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "3. Test the FAT build on your iOS device" >> $GITHUB_STEP_SUMMARY
